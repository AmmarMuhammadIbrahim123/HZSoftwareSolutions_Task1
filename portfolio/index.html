<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Link External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= NAVIGATION BAR ================= -->
    <header>
        <nav class="navbar">
            <h2 class="logo">Ammar</h2>

            <!-- Mobile Menu Toggle Button -->
            <div class="menu-toggle" id="menu-toggle">
                ☰
            </div>

            <!-- Navigation Links -->
            <ul class="nav-links" id="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#resume">Resume</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>


    <!-- ================= HERO SECTION ================= -->
    <section id="home" class="section">
        <h1>Hello, I'm Ammar</h1>
        <p>Frontend Developer | HTML | CSS | JavaScript</p>
    </section>


    <!-- ================= SKILLS SECTION ================= -->
    <section id="skills" class="section reveal">
        <h2>My Skills</h2>
        <div class="skill-box">HTML</div>
        <div class="skill-box">CSS</div>
        <div class="skill-box">JavaScript</div>
        <div class="skill-box">React</div>
    </section>


    <!-- ================= PROJECTS SECTION ================= -->
    <section id="projects" class="section reveal">
        <h2>My Projects</h2>
        <div class="project-card">Calculator App</div>
        <div class="project-card">Image Gallery</div>
        <div class="project-card">E-commerce Landing Page</div>
    </section>


    <!-- ================= RESUME SECTION ================= -->
    <section id="resume" class="section reveal">
        <h2>Resume</h2>
        <a href="#" class="btn">Download CV</a>
    </section>


    <!-- ================= CONTACT SECTION ================= -->
    <section id="contact" class="section reveal">
        <h2>Contact Me</h2>

        <!-- Contact Form -->
        <form id="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <!-- Link External JavaScript -->
    <script src="index.js"></script>

</body>
</html>
