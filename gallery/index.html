<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>

    <!-- Link External CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Heading -->
    <h1>Modern Image Gallery</h1>

    <!-- ================= FILTER BUTTONS ================= -->
    <!-- These buttons allow filtering images by category -->
    <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="nature">Nature</button>
        <button data-filter="city">City</button>
        <button data-filter="animals">Animals</button>
    </div>

    <!-- ================= IMAGE GALLERY ================= -->
    <!-- Each image has a category class for filtering -->
    <div class="gallery">

        <div class="item nature">
            <img src="https://picsum.photos/400/300?random=1" alt="Nature Image">
        </div>

        <div class="item city">
            <img src="https://picsum.photos/400/300?random=2" alt="City Image">
        </div>

        <div class="item animals">
            <img src="https://picsum.photos/400/300?random=3" alt="Animal Image">
        </div>

        <div class="item nature">
            <img src="https://picsum.photos/400/300?random=4" alt="Nature Image">
        </div>

        <div class="item city">
            <img src="https://picsum.photos/400/300?random=5" alt="City Image">
        </div>

        <div class="item animals">
            <img src="https://picsum.photos/400/300?random=6" alt="Animal Image">
        </div>

    </div>

    <!-- ================= LIGHTBOX MODAL ================= -->
    <!-- This section appears when user clicks an image -->
    <div class="lightbox">

        <!-- Close Button -->
        <span class="close">&times;</span>

        <!-- Previous Button -->
        <button class="prev">&#10094;</button>

        <!-- Selected Image Display -->
        <img class="lightbox-img" alt="Preview Image">

        <!-- Next Button -->
        <button class="next">&#10095;</button>

    </div>

    <!-- Link External JavaScript File -->
    <script src="index.js"></script>

</body>
</html>
